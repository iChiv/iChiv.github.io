title: Alex Ziwei Niu
description: Gameplay and systems design portfolio for Alex Ziwei Niu
author: Alex Ziwei Niu
email: zzzv0325@gmail.com
url: https://iChiv.github.io
lang: en
role: Game Systems / Gameplay Designer
tagline: Designing systems, prototyping interactions, and building player-first game experiences.
social:
  github: https://github.com/iChiv

collections:
  games:
    output: true
    permalink: /games/:slug/
  xr:
    output: true
    permalink: /xr/:slug/
  reviews:
    output: true
    permalink: /reviews/:slug/

defaults:
  - scope:
      path: ""
      type: "games"
    values:
      layout: "project"
      category: "Games"
  - scope:
      path: ""
      type: "xr"
    values:
      layout: "project"
      category: "XR"
  - scope:
      path: ""
      type: "reviews"
    values:
      layout: "project"
      category: "Reviews"

markdown: kramdown
highlighter: rouge

plugins:
  - jekyll-feed
  - jekyll-seo-tag
